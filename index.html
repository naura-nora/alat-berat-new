<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
    <title>Login - Alat Berat Rental</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* VIDEO BACKGROUND */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* OVERLAY */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(0,0,0,0.65),
                rgba(0,0,0,0.75)
            );
            z-index: -1;
        }

        /* WRAPPER */
        .main-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container-custom {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* LEFT CONTENT */
        .left-content {
            color: white;
            padding: 20px;
            text-align: center;
        }

        .left-content h1 {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .left-content p {
            font-size: 16px;
            opacity: 0.8;
            max-width: 400px;
            margin: 0 auto;
        }

        .line {
            width: 60px;
            height: 3px;
            background: #ffbf2b;
            margin: 15px auto;
        }

        /* LOGIN BOX */
        .login-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border-radius: 15px;
            padding: 30px 25px;
            width: 100%;
            max-width: 400px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            margin: 0 auto;
            animation: fadeIn 0.8s ease;
        }

        /* HEADER */
        .login-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .login-header h2 {
            color: white;
            font-weight: 600;
            font-size: 22px;
        }

        .login-header img {
            max-width: 100px;
            height: auto;
            margin-bottom: 10px;
        }

        /* INPUT */
        .form-control {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 12px;
            font-size: 14px;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.3);
            color: white;
            outline: none;
            box-shadow: none;
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.7);
        }

        /* CHECKBOX */
        .form-check-label {
            color: white;
            font-size: 14px;
        }

        /* BUTTON */
        .btn-login {
            background: linear-gradient(45deg, #ffbf2b, #ff8c00);
            color: black;
            border: none;
            font-weight: bold;
            padding: 12px;
            transition: 0.3s;
            font-size: 16px;
        }

        .btn-login:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        /* REGISTER */
        .register-link {
            border-top: 1px solid rgba(255,255,255,0.3);
            color: white;
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            font-size: 14px;
        }

        .register-link a {
            color: #ffbf2b;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* ANIMATION */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* RESPONSIVE */
        @media (min-width: 769px) {
            .left-content h1 {
                font-size: 48px;
                text-align: left;
            }
            
            .left-content p {
                margin: 0;
                text-align: left;
            }
            
            .line {
                margin: 15px 0;
            }
            
            .login-box {
                padding: 45px;
                margin-right: 60px;
                margin-left: auto;
            }
            
            .left-content {
                text-align: left;
                padding: 0 80px;
            }
        }

        @media (max-width: 768px) {
            .main-wrapper {
                padding: 15px;
                align-items: flex-start;
                padding-top: 40px;
            }
            
            .login-box {
                padding: 25px 20px;
                margin: 0 auto;
            }
            
            .left-content {
                margin-bottom: 30px;
            }
            
            .left-content h1 {
                font-size: 28px;
            }
            
            .left-content p {
                font-size: 14px;
            }
            
            .login-header h2 {
                font-size: 20px;
            }
            
            .login-header img {
                max-width: 80px;
            }
            
            .btn-login {
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 20px 15px;
            }
            
            .left-content h1 {
                font-size: 24px;
            }
            
            .form-control {
                padding: 10px;
                font-size: 13px;
            }
            
            .btn-login {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- VIDEO -->
    <video autoplay muted loop id="bg-video">
        <source src="./videos/eskanew.mp4" type="video/mp4">
    </video>

    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- CONTENT -->
    <div class="main-wrapper">
        <div class="container-custom">
            <div class="row g-0">
                
                <!-- LEFT CONTENT -->
                <div class="col-12 col-md-6 d-flex flex-column justify-content-center left-content">
                    <h1>HEAVY EQUIPMENT RENTAL</h1>
                    <div class="line"></div>
                    <p>Solusi cepat dan profesional untuk peminjaman alat berat</p>
                </div>

                <!-- RIGHT LOGIN -->
                <div class="col-12 col-md-6 d-flex justify-content-center align-items-center">
                    <div class="login-box">

                        <!-- HEADER -->
                        <div class="login-header">
                            <img src="./images/logo-alatberat.png"
                                alt="Logo"
                                style="width: 100px; height: auto; object-fit: contain;">
                            <h2>AlatBerat Rental</h2>
                            <p style="font-size: 14px; opacity: 0.8;">Silakan login untuk melanjutkan</p>
                        </div>

                        <!-- FORM -->
                        <form method="POST" action="#">
                            <div class="mb-3">
                                <input type="email" name="email" class="form-control" 
                                       placeholder="Email" value="" required autofocus>
                            </div>
                            
                            <div class="mb-3">
                                <input type="password" name="password" class="form-control" 
                                       placeholder="Password" required>
                            </div>
                            
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="remember" name="remember">
                                <label class="form-check-label" for="remember">Remember me</label>
                            </div>
                            
                            <button type="submit" class="btn btn-login w-100">
                                <i class="fas fa-sign-in-alt me-2"></i> Login
                            </button>
                        </form>

                        <!-- REGISTER -->
                        <div class="register-link">
                            <p class="mb-0">Belum punya akun? 
                                <a href="#">Register</a>
                            </p>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
